name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Non-blocking until pre-existing lint errors are fixed
        continue-on-error: true
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
